name: Nightly Tests

on:
  schedule:
    # Run every Sunday at 12:00 AM UTC
    - cron: '0 0 * * 0'
  push:
    branches:
      - main

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: |
          pytest Typi_Code_Tests/Test_Scripts/ -v --html=api-report.html --self-contained-html
        env:
          URL_API: https://jsonplaceholder.typicode.com/

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: api-report.html
          retention-days: 30

  ui-tests:
    name: UI Tests (Headless Chrome)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2
        with:
          chromedriver-version: stable

      - name: Run UI tests
        run: |
          pytest Typi_Code_Tests/UI_Tests/ -v --html=ui-report.html --self-contained-html
        env:
          CI: 'true'
          BROWSER: chrome_headless
          BASE_URL: https://practice.expandtesting.com/
          EXPLICIT_WAIT: '10'
          IMPLICIT_WAIT: '5'

      - name: Upload UI test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: ui-report.html
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4

      - name: Display test results
        run: |
          echo "=== Test Execution Summary ==="
          echo "API Tests: ${{ needs.api-tests.result }}"
          echo "UI Tests: ${{ needs.ui-tests.result }}"
          echo ""
          echo "Test reports have been generated and uploaded as artifacts."
          echo "You can download them from the 'Artifacts' section of this workflow run."
